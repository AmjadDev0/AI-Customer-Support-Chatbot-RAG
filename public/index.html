<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Customer Support</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <img class="bg-net" src="assets/bg-net.svg" aria-hidden="true" />

  <div class="widget">
    <header>
      <img class="avatar-lg" src="assets/mascot.svg" aria-hidden="true" />
      <div class="titles">
        <h1>AI Customer Support</h1>
        <span class="status"><span class="dot"></span>Online</span>
      </div>
      <button class="menu" type="button" aria-label="Menu" title="Menu">
        <img class="menu-icon" src="assets/icons/menu.svg" />
      </button>
    </header>

    <div id="messages" role="log" aria-live="polite" aria-label="Conversation"></div>

    <div class="composer">
      <form id="form" autocomplete="off">
        <input id="input" type="text" placeholder="Type your message…" aria-label="Message" required />
        <button id="send" type="submit" aria-label="Send message">
          <img class="send-icon" src="assets/icons/send.svg" />
        </button>
      </form>
    </div>

    <nav class="footer" aria-label="Support links">
      <a href="#" id="settings-link">
        <img class="footer-icon" src="assets/icons/settings.svg" />
        Settings
      </a>
      <a href="#" id="faq-link">
        <img class="footer-icon" src="assets/icons/faq.svg" />
        FAQ
      </a>
      <a href="#" id="contact-link">
        <img class="footer-icon" src="assets/icons/contact.svg" />
        Contact
      </a>
    </nav>
  </div>

  <script src="js/chat.js"></script>
</body>
</html>
