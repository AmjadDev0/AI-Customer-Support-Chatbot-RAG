<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Assistant</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #ffffff;
      --user: #2563eb;
      --bot: #f1f5f9;
      --bot-text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: #f59e0b;
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--bot-text);
      padding: 16px;
    }
    .widget {
      width: 100%;
      max-width: 440px;
      height: min(680px, 90vh);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      padding: 18px 20px;
      background: var(--bg);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.25);
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    header p { margin: 2px 0 0; font-size: 12px; color: #94a3b8; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #fafafa;
    }
    .msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.45;
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
      animation: fade 0.2s ease;
    }
    @keyframes fade {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--bot);
      color: var(--bot-text);
      border-bottom-left-radius: 4px;
    }
    .msg.error { background: #fee2e2; color: #991b1b; }
    .typing { display: inline-flex; gap: 4px; }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite ease-in-out both;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
    .handoff {
      align-self: flex-start;
      max-width: 82%;
    }
    .handoff button {
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 13px;
      padding: 10px 16px;
      border-radius: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: filter 0.15s ease;
    }
    .handoff button:hover { filter: brightness(1.05); }
    form {
      display: flex;
      gap: 8px;
      padding: 14px;
      border-top: 1px solid var(--border);
      background: #fff;
    }
    #input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s ease;
    }
    #input:focus { border-color: var(--user); }
    #send {
      border: none;
      background: var(--user);
      color: #fff;
      border-radius: 12px;
      padding: 0 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #send:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="widget">
    <header>
      <span class="dot"></span>
      <div>
        <h1>Support Assistant</h1>
        <p>Ask a question about our product</p>
      </div>
    </header>

    <div id="messages"></div>

    <form id="form" autocomplete="off">
      <input id="input" type="text" placeholder="Type your message…" required />
      <button id="send" type="submit">Send</button>
    </form>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    // Update this to a real contact channel for your support team.
    const SUPPORT_URL = 'mailto:support@example.com';

    function addMessage(text, role) {
      const el = document.createElement('div');
      el.className = `msg ${role}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      scrollToBottom();
      return el;
    }

    function addHandoffButton() {
      const wrap = document.createElement('div');
      wrap.className = 'handoff';
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.innerHTML = '🙋 Contact human support';
      btn.addEventListener('click', () => { window.location.href = SUPPORT_URL; });
      wrap.appendChild(btn);
      messagesEl.appendChild(wrap);
      scrollToBottom();
    }

    function showTyping() {
      const el = document.createElement('div');
      el.className = 'msg bot';
      el.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
      messagesEl.appendChild(el);
      scrollToBottom();
      return el;
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage(message) {
      const typingEl = showTyping();
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });
        const data = await res.json();
        typingEl.remove();

        if (!res.ok) {
          addMessage(data.error || 'Something went wrong.', 'error');
          return;
        }

        addMessage(data.answer, 'bot');
        if (data.handoff) addHandoffButton();
      } catch (err) {
        typingEl.remove();
        addMessage('Network error — please try again.', 'error');
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, 'user');
      input.value = '';
      input.focus();
      sendBtn.disabled = true;

      await sendMessage(message);
      sendBtn.disabled = false;
    });

    // Greeting
    addMessage('Hi! How can I help you today?', 'bot');
  </script>
</body>
</html>
